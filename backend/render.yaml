services:
  - type: web
    name: enterprise-data-platform
    env: node
    plan: free
    buildCommand: cd backend && npm install && python3 -m pip install --user psycopg2-binary
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: RENDER_WAKE_INTERVAL_MS
        value: 30000
      - key: DATA_REFRESH_HOUR
        value: 4
      - key: DATA_REFRESH_MINUTE
        value: 0
